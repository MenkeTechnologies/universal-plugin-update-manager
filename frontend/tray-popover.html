<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Same stack as `index.html` -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    html {
      color-scheme: dark;
    }
    /* `--cp-*` mirror main-window tokens from IPC; fallbacks match `index.html` :root */
    :root {
      --cp-bg0: var(--bg-primary, #05050a);
      --cp-bg1: var(--bg-card, #0d0d1a);
      --cp-cyan: var(--cyan, #05d9e8);
      --cp-cyan-hot: var(--accent-light, #ff6b9d);
      --cp-cyan-dim: var(--cyan-dim, rgba(5, 217, 232, 0.15));
      --cp-magenta: var(--magenta, #d300c5);
      --cp-magenta-dim: var(--magenta-glow, rgba(211, 0, 197, 0.3));
      --cp-text: var(--text, #e0f0ff);
      --cp-muted: var(--text-muted, #3d4f6a);
      --cp-text-dim: var(--text-dim, #7a8ba8);
      --cp-shell-border: var(--cyan, #05d9e8);
      --cp-title-glow: var(--cyan-glow, rgba(5, 217, 232, 0.4));
      --cp-divider: var(--border, #1a1a3e);
      --cp-track-bg: color-mix(in srgb, var(--bg-primary, #05050a) 82%, var(--border, #1a1a3e));
      --cp-track-border: var(--border, #1a1a3e);
      --cp-accent-glow: var(--accent-glow, rgba(255, 42, 109, 0.4));
      --cp-wash-line: var(--cyber-grid-line, rgba(5, 217, 232, 0.042));
      --cp-wash-radial: rgba(5, 217, 232, 0.06);
      --cp-thumb-glow: var(--cyan-glow, rgba(5, 217, 232, 0.4));
      --cp-shell-radius: 12px;
    }
    html[data-theme="light"] {
      color-scheme: light;
      --cp-bg0: var(--bg-primary, #f0f2f5);
      --cp-bg1: var(--bg-card, #ffffff);
      --cp-cyan: var(--cyan, #0891b2);
      --cp-cyan-hot: var(--accent-light, #e84d8a);
      --cp-cyan-dim: var(--cyan-dim, rgba(8, 145, 178, 0.08));
      --cp-magenta: var(--magenta, #a300a3);
      --cp-magenta-dim: var(--magenta-glow, rgba(163, 0, 163, 0.15));
      --cp-text: var(--text, #1e293b);
      --cp-muted: var(--text-muted, #94a3b8);
      --cp-text-dim: var(--text-dim, #475569);
      --cp-shell-border: var(--cyan, #0891b2);
      --cp-title-glow: var(--cyan-glow, rgba(8, 145, 178, 0.2));
      --cp-divider: var(--border, #cbd5e1);
      --cp-track-bg: color-mix(in srgb, var(--bg-primary, #f0f2f5) 88%, var(--border, #cbd5e1));
      --cp-track-border: var(--border, #cbd5e1);
      --cp-accent-glow: var(--accent-glow, rgba(214, 25, 110, 0.15));
      --cp-wash-line: var(--cyber-grid-line, rgba(8, 145, 178, 0.08));
      --cp-wash-radial: rgba(8, 145, 178, 0.07);
      --cp-thumb-glow: rgba(8, 145, 178, 0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      /* DO NOT use `width: 100%` or `min-height: 100%` here. `body`/`html` filling the window
       * creates a positive feedback loop with `syncWindowSize()` in `tray-popover.js`:
       * `body.scrollHeight` would equal the current window height, `Math.max(shellH, bodyH)`
       * would perpetually return the window size, and the window could only grow. `width: auto`
       * + `display: inline-block` on `body` makes it shrink-wrap to the `#shell` child, so the
       * window resize IPC is driven by the shell's intrinsic size instead of its own past size. */
      width: auto;
      height: auto;
      margin: 0;
      outline: none;
      font-family: 'Share Tech Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      -webkit-font-smoothing: antialiased;
      background: transparent;
      color: var(--cp-text);
    }
    body {
      display: inline-block;
    }
    /* Match `.audio-now-playing` floating player panel */
    .shell {
      position: relative;
      width: 340px;
      min-height: 0;
      margin: 0;
      padding: 14px 16px 12px;
      border-radius: var(--cp-shell-radius);
      background: var(--cp-bg0);
      border: 1px solid var(--cp-shell-border);
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--cp-magenta) 35%, transparent),
        0 0 24px var(--cp-title-glow),
        0 0 48px color-mix(in srgb, var(--cp-accent-glow) 20%, transparent),
        0 6px 28px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
      overflow: hidden;
    }
    html[data-theme="light"] .shell {
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--cp-magenta) 22%, transparent),
        0 0 20px var(--cp-title-glow),
        0 6px 24px rgba(15, 23, 42, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }
    .shell .crt-wash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(180deg, transparent, transparent 2px, var(--cp-wash-line) 2px, var(--cp-wash-line) 4px),
        radial-gradient(ellipse 120% 80% at 50% 0%, var(--cp-wash-radial) 0%, transparent 55%);
      opacity: 0.85;
    }
    .title:empty { display: none; }
    /* `.now-playing-name` */
    .title {
      position: relative;
      font-family: 'Share Tech Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: 0.02em;
      text-transform: none;
      color: var(--cp-cyan);
      overflow-wrap: anywhere;
      word-break: break-word;
      /* Rare huge filenames: keep window sane; full string still in DOM and scrollable. */
      max-height: 7.5rem;
      overflow-y: auto;
    }
    /* `.np-meta-line` */
    .subtitle {
      position: relative;
      margin-top: 8px;
      font-family: 'Share Tech Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      font-weight: 400;
      line-height: 1.45;
      letter-spacing: 0.02em;
      color: var(--cp-muted);
      overflow-wrap: anywhere;
      word-break: break-word;
      /* Long directory paths: scroll instead of clipping or an oversized popover. */
      max-height: min(380px, 48vh);
      overflow-y: auto;
    }
    .title::-webkit-scrollbar,
    .subtitle::-webkit-scrollbar {
      width: 6px;
    }
    .title::-webkit-scrollbar-thumb,
    .subtitle::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--cp-cyan) 35%, transparent);
      border-radius: 3px;
    }
    .subtitle:empty { display: none; }
    .tray-subtitle-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 4px 6px;
      width: 100%;
    }
    .tray-subtitle-path-toggle {
      appearance: none;
      font-family: inherit;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      margin: 0;
      cursor: pointer;
      color: var(--cp-cyan);
      background: color-mix(in srgb, var(--cp-bg1) 88%, transparent);
      border: 1px solid color-mix(in srgb, var(--cp-cyan) 40%, transparent);
      border-radius: 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      line-height: 1.2;
      box-shadow: 0 0 6px var(--cp-cyan-dim);
    }
    .tray-subtitle-path-toggle:hover {
      background: color-mix(in srgb, var(--cp-cyan) 10%, transparent);
      box-shadow: 0 0 10px var(--cp-title-glow);
    }
    .tray-subtitle-path-chevron {
      display: inline-block;
      font-size: 7px;
      line-height: 1;
      transition: transform 0.15s ease;
      transform: rotate(-90deg);
    }
    .tray-subtitle-path-toggle[aria-expanded="true"] .tray-subtitle-path-chevron {
      transform: rotate(0deg);
    }
    .tray-subtitle-path-panel {
      margin-top: 6px;
      width: 100%;
      box-sizing: border-box;
      max-height: min(260px, 38vh);
      overflow-x: hidden;
      overflow-y: auto;
      padding-right: 2px;
    }
    .tray-subtitle-path-panel::-webkit-scrollbar {
      width: 6px;
    }
    .tray-subtitle-path-panel::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--cp-cyan) 35%, transparent);
      border-radius: 3px;
    }
    .tray-subtitle-path.tray-subtitle-reveal {
      cursor: pointer;
      text-decoration: underline dotted;
      text-decoration-color: color-mix(in srgb, var(--cp-cyan) 55%, transparent);
    }
    .tray-subtitle-path.tray-subtitle-reveal:hover {
      color: var(--cp-cyan);
    }
    .divider {
      position: relative;
      height: 1px;
      margin: 10px 0 8px;
      background: var(--cp-divider);
      box-shadow: 0 0 6px var(--cp-cyan-dim);
    }
    .idle-hint {
      position: relative;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--cp-muted);
      margin: 4px 0 0;
      opacity: 0.85;
    }
    .progress-wrap { position: relative; margin-top: 4px; }
    .track-bar {
      position: relative;
      padding: 4px 0;
      cursor: pointer;
      touch-action: none;
    }
    .track-bg {
      position: relative;
      height: 28px;
      border-radius: 0;
      background: var(--cp-track-bg);
      border: 1px solid var(--cp-track-border);
      overflow: visible;
    }
    /* Mini waveform canvas — peaks sent from the main window in `TrayPopoverEmit.waveform_peaks`.
     * Rendered once per track and cached by path; overlays (fill, cursor, loop) sit on top. */
    .track-waveform-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      image-rendering: pixelated;
    }
    /* `.now-playing-progress` — translucent overlay on top of the waveform. */
    .track-fill {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 0%;
      border-radius: 0;
      background: linear-gradient(
        90deg,
        color-mix(in srgb, var(--cp-cyan) 18%, transparent),
        color-mix(in srgb, var(--cp-magenta) 14%, transparent)
      );
      pointer-events: none;
    }
    /* Playhead cursor — vertical line spanning the full waveform height. */
    .track-thumb {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 2px;
      margin-left: -1px;
      background: var(--cp-cyan);
      box-shadow: 0 0 4px var(--cp-thumb-glow);
      pointer-events: none;
      z-index: 4;
    }
    .idle .track-thumb { opacity: 0; }
    /* Per-sample loop region on the tray progress bar — spans the full 28 px waveform height so
     * braces are unmistakable. Matches the yellow (#ffe600) used on the main-window meta waveform
     * braces. Pointer-events none — the trackBar owns scrub/paint/exit gestures. */
    .track-loop-region {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 0;
      background: rgba(255, 230, 0, 0.14);
      pointer-events: none;
      display: none;
      z-index: 2;
    }
    .track-loop-brace {
      box-sizing: border-box;
      position: absolute;
      top: 0;
      bottom: 0;
      width: 8px;
      pointer-events: none;
      display: none;
      z-index: 5;
    }
    .track-loop-brace-start {
      margin-left: 0;
      border-left: 2px solid #ffe600;
      border-top: 2px solid #ffe600;
      border-bottom: 2px solid #ffe600;
      border-right: none;
    }
    .track-loop-brace-end {
      margin-left: -8px;
      border-right: 2px solid #ffe600;
      border-top: 2px solid #ffe600;
      border-bottom: 2px solid #ffe600;
      border-left: none;
    }
    .idle .track-loop-region,
    .idle .track-loop-brace { display: none !important; }
    /* `.now-playing-time` — Orbitron */
    .times {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 6px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--cp-text-dim);
    }
    #elapsed,
    #total {
      color: var(--cp-text-dim);
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
    }
    .transport {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
      padding-top: 0;
    }
    /* `.btn-secondary`-style controls */
    .transport button {
      appearance: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 6px 10px;
      border-radius: 0;
      cursor: pointer;
      background: transparent;
      color: var(--cp-cyan);
      border: 1px solid var(--cp-cyan);
      box-shadow: 0 0 8px var(--cp-cyan-dim);
      line-height: 1;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s, border-color 0.15s, color 0.15s;
    }
    .transport button:hover {
      background: color-mix(in srgb, var(--cp-cyan) 10%, transparent);
      box-shadow: 0 0 15px var(--cp-title-glow);
      transform: translateY(-1px);
      color: var(--cp-cyan);
    }
    .transport button:active {
      transform: translateY(1px) scale(0.98);
    }
    .transport .play-btn { font-size: 11px; padding: 7px 12px; }
    .transport button.active {
      color: var(--cp-cyan-hot);
      border-color: var(--cp-cyan-hot);
      box-shadow: 0 0 10px var(--cp-accent-glow);
    }
    .idle .progress-wrap { opacity: 0.35; pointer-events: none; }
    .idle .transport { opacity: 0.45; }
    .idle .divider { opacity: 0.35; margin: 8px 0 6px; }
    .tray-extras {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      padding-top: 2px;
    }
    .tray-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .tray-row:first-child { margin-top: 0; }
    .tray-mini-label {
      flex: 0 0 auto;
      min-width: 42px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--cp-muted);
    }
    .tray-vol-pct {
      flex: 0 0 34px;
      text-align: right;
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--cp-text-dim);
    }
    .tray-vol-slider {
      flex: 1;
      min-width: 0;
      height: 6px;
      margin: 0;
      accent-color: var(--cp-cyan);
      cursor: pointer;
    }
    .tray-speed-select {
      flex: 1;
      min-width: 0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 4px 6px;
      border-radius: 0;
      color: var(--cp-cyan);
      background: color-mix(in srgb, var(--cp-bg1) 88%, transparent);
      border: 1px solid var(--cp-cyan);
      box-shadow: 0 0 6px var(--cp-cyan-dim);
      cursor: pointer;
    }
    .tray-speed-select:focus {
      outline: 1px solid var(--cp-cyan-hot);
      outline-offset: 1px;
    }
    /* Tray-only context menu (separate WebView — not `#ctxMenu` from index) */
    .tray-ctx-menu {
      display: none;
      position: fixed;
      z-index: 50000;
      min-width: 188px;
      background: var(--cp-bg0);
      border: 1px solid var(--cp-cyan);
      box-shadow: 0 0 16px var(--cp-title-glow), 0 6px 20px rgba(0, 0, 0, 0.45);
      padding: 4px 0;
      font-size: 11px;
      font-family: 'Share Tech Mono', 'SF Mono', monospace;
    }
    .tray-ctx-menu.visible {
      display: block;
    }
    .tray-ctx-item {
      padding: 7px 14px;
      cursor: pointer;
      color: var(--cp-text);
      white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }
    .tray-ctx-item:hover {
      background: color-mix(in srgb, var(--cp-cyan) 12%, transparent);
      color: var(--cp-cyan);
    }
    .tray-ctx-sep {
      height: 1px;
      background: var(--cp-divider);
      margin: 4px 8px;
    }
  </style>
</head>
<body>
  <div class="shell" id="shell">
    <div class="crt-wash" aria-hidden="true"></div>
    <div class="title" id="trayPopoverTitle"></div>
    <div class="subtitle" id="subtitle"></div>
    <div class="idle-hint" id="idleHint" hidden></div>
    <div class="divider" aria-hidden="true"></div>
    <div class="progress-wrap" id="trayProgressWrap">
      <div class="track-bar" id="trackBar">
        <div class="track-bg">
          <canvas class="track-waveform-canvas" id="trayWaveformCanvas"></canvas>
          <div class="track-fill" id="fill"></div>
          <div class="track-loop-region" id="trayLoopRegion"></div>
          <div class="track-loop-brace track-loop-brace-start" id="trayLoopBraceStart"></div>
          <div class="track-loop-brace track-loop-brace-end" id="trayLoopBraceEnd"></div>
          <div class="track-thumb" id="trackThumb"></div>
        </div>
      </div>
      <div class="times">
        <span id="elapsed">0:00</span>
        <span id="total">—</span>
      </div>
    </div>
    <div class="tray-extras" id="trayExtras">
      <div class="tray-row">
        <label class="tray-mini-label" for="trayVol" id="trayVolLabel">Vol</label>
        <input type="range" class="tray-vol-slider" id="trayVol" min="0" max="100" value="100" />
        <span class="tray-vol-pct" id="trayVolPct">100%</span>
      </div>
      <div class="tray-row">
        <label class="tray-mini-label" for="traySpeed" id="traySpeedLabel">Speed</label>
        <select class="tray-speed-select" id="traySpeed"></select>
      </div>
    </div>
    <div class="transport">
      <button type="button" id="btnShuffle">&#128256;</button>
      <button type="button" id="btnPrev">&#x23ee;</button>
      <button type="button" class="play-btn" id="btnPlay">&#x23f8;</button>
      <button type="button" id="btnNext">&#x23ed;</button>
      <button type="button" id="btnLoop">&#8634;</button>
      <button type="button" id="btnFav">&#9733;</button>
    </div>
  </div>
  <div class="tray-ctx-menu" id="trayCtxMenu" aria-hidden="true"></div>
  <script src="js/tray-popover.js?v=24316"></script>
</body>
</html>
