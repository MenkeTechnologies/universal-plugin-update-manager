<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <style>
    :root {
      --cp-bg0: #14161c;
      --cp-bg1: #1e222d;
      --cp-cyan: #00e5ff;
      --cp-cyan-dim: rgba(0, 229, 255, 0.55);
      --cp-magenta: #ff2aa3;
      --cp-magenta-dim: rgba(255, 42, 163, 0.45);
      --cp-text: #e8f4ff;
      --cp-muted: rgba(232, 244, 255, 0.45);
      --cp-edge: rgba(255, 255, 255, 0.14);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: transparent;
    }
    /* Asymmetric panel: large TL radius like a HUD slice; sharp TR per reference */
    .shell {
      position: relative;
      width: 300px;
      min-height: 168px;
      margin: 0 auto;
      padding: 12px 14px 10px;
      border-radius: 22px 5px 12px 12px;
      background: linear-gradient(165deg, var(--cp-bg1) 0%, var(--cp-bg0) 100%);
      border: 1px solid var(--cp-cyan-dim);
      box-shadow:
        inset 0 1px 0 var(--cp-edge),
        inset 0 -1px 0 rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(0, 0, 0, 0.5),
        0 0 24px rgba(0, 229, 255, 0.12),
        0 0 48px rgba(255, 42, 163, 0.06);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
    }
    .shell::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        transparent,
        transparent 3px,
        rgba(0, 229, 255, 0.04) 3px,
        rgba(0, 229, 255, 0.04) 4px
      );
      opacity: 0.9;
    }
    .shell::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--cp-cyan), transparent 55%, var(--cp-magenta));
      opacity: 0.55;
      pointer-events: none;
      border-radius: 22px 5px 0 0;
    }
    .title {
      position: relative;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--cp-text);
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.25);
      max-height: 2.5em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .subtitle {
      position: relative;
      margin-top: 5px;
      font-size: 11px;
      line-height: 1.35;
      letter-spacing: 0.06em;
      color: var(--cp-cyan-dim);
      max-height: 2.8em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .subtitle:empty { display: none; }
    .divider {
      position: relative;
      height: 1px;
      margin: 10px 0 8px;
      background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.35) 20%, rgba(255, 42, 163, 0.35) 80%, transparent);
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
    }
    .idle-hint {
      position: relative;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cp-muted);
      margin: 4px 0 0;
    }
    .progress-wrap { position: relative; margin-top: 2px; }
    .track-bg {
      height: 5px;
      border-radius: 2px;
      background: rgba(0, 0, 0, 0.45);
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      border: 1px solid rgba(0, 229, 255, 0.15);
    }
    .track-fill {
      height: 100%;
      width: 0%;
      border-radius: 1px;
      background: linear-gradient(90deg, var(--cp-cyan), var(--cp-magenta));
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.45);
      transition: width 0.12s linear;
    }
    .times {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 6px;
      font-family: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
    }
    #elapsed {
      color: var(--cp-cyan);
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.35);
    }
    #total {
      color: var(--cp-text);
      font-weight: 600;
      text-shadow: 0 0 6px rgba(255, 42, 163, 0.25);
    }
    .transport {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      margin-top: 12px;
      padding-top: 2px;
    }
    .transport button {
      appearance: none;
      border: 1px solid rgba(0, 229, 255, 0.25);
      background: rgba(0, 0, 0, 0.25);
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 4px;
      color: var(--cp-cyan);
      line-height: 1;
      font-size: 16px;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.08);
      transition: border-color 0.15s, box-shadow 0.15s, color 0.15s;
    }
    .transport button:hover {
      border-color: var(--cp-cyan);
      box-shadow: 0 0 16px rgba(0, 229, 255, 0.25);
      color: #fff;
    }
    .transport button:active { transform: scale(0.96); }
    .transport .play-btn { font-size: 19px; padding: 5px 10px; }
    .idle .progress-wrap,
    .idle .transport { opacity: 0.35; pointer-events: none; }
    .idle .divider { opacity: 0.4; }
  </style>
</head>
<body>
  <div class="shell" id="shell">
    <div class="title" id="title"></div>
    <div class="subtitle" id="subtitle"></div>
    <div class="idle-hint" id="idleHint" hidden></div>
    <div class="divider" aria-hidden="true"></div>
    <div class="progress-wrap">
      <div class="track-bg"><div class="track-fill" id="fill"></div></div>
      <div class="times">
        <span id="elapsed">0:00</span>
        <span id="total">—</span>
      </div>
    </div>
    <div class="transport">
      <button type="button" id="btnPrev" title="Previous">⏮</button>
      <button type="button" class="play-btn" id="btnPlay" title="Play/Pause">⏸</button>
      <button type="button" id="btnNext" title="Next">⏭</button>
    </div>
  </div>
  <script src="js/tray-popover.js"></script>
</body>
</html>
