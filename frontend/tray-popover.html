<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Desaturated navy HUD (CRT reference) */
      --cp-bg0: #0a0e14;
      --cp-bg1: #121820;
      --cp-cyan: #5ce1ff;
      --cp-cyan-hot: #88eeff;
      --cp-cyan-dim: rgba(92, 225, 255, 0.5);
      --cp-magenta: #ff2aa3;
      --cp-magenta-dim: rgba(255, 42, 163, 0.45);
      --cp-text: #d8f8ff;
      --cp-muted: rgba(200, 235, 255, 0.42);
      --cp-scan: rgba(0, 0, 0, 0.22);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "JetBrains Mono", ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
      -webkit-font-smoothing: antialiased;
      background: transparent;
    }
    /* Asymmetric panel: large TL radius; HUD slice */
    .shell {
      position: relative;
      width: 300px;
      min-height: 168px;
      margin: 0 auto;
      padding: 12px 14px 10px;
      border-radius: 24px 4px 12px 12px;
      background: linear-gradient(168deg, #161c26 0%, var(--cp-bg1) 42%, var(--cp-bg0) 100%);
      border: 1px solid rgba(92, 225, 255, 0.22);
      /* Top + left cyan glow (reference image) */
      box-shadow:
        inset 1px 0 0 rgba(136, 238, 255, 0.35),
        inset 0 1px 0 rgba(136, 238, 255, 0.45),
        inset 0 -1px 0 rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(0, 0, 0, 0.65),
        0 0 20px rgba(92, 225, 255, 0.14),
        0 0 42px rgba(255, 42, 163, 0.05);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
    }
    /* CRT horizontal scanlines (stronger than before) */
    .shell::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        transparent,
        transparent 1px,
        var(--cp-scan) 1px,
        var(--cp-scan) 2px
      );
      mix-blend-mode: multiply;
      opacity: 0.85;
    }
    /* Subtle cyan wash + vignette */
    .shell .crt-wash {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, rgba(92, 225, 255, 0.06) 0%, transparent 55%);
      opacity: 1;
    }
    .shell::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--cp-cyan-hot), rgba(92, 225, 255, 0.2) 45%, var(--cp-magenta));
      opacity: 0.65;
      pointer-events: none;
      box-shadow: 0 0 10px rgba(92, 225, 255, 0.35);
      border-radius: 24px 4px 0 0;
    }
    .title {
      position: relative;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cp-text);
      text-shadow: 0 0 14px rgba(92, 225, 255, 0.35);
      max-height: 2.6em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .subtitle {
      position: relative;
      margin-top: 5px;
      font-size: 10px;
      line-height: 1.4;
      letter-spacing: 0.08em;
      color: var(--cp-cyan-dim);
      max-height: 2.8em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .subtitle:empty { display: none; }
    .divider {
      position: relative;
      height: 1px;
      margin: 10px 0 8px;
      background: linear-gradient(90deg, transparent, rgba(92, 225, 255, 0.5) 20%, rgba(255, 42, 163, 0.35) 80%, transparent);
      box-shadow: 0 0 10px rgba(92, 225, 255, 0.35);
    }
    .idle-hint {
      position: relative;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--cp-muted);
      margin: 4px 0 0;
    }
    .progress-wrap { position: relative; margin-top: 2px; }
    /* Thin track above readout (reference) */
    .track-bg {
      height: 3px;
      border-radius: 1px;
      background: rgba(0, 0, 0, 0.55);
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.75);
      overflow: hidden;
      border: 1px solid rgba(92, 225, 255, 0.22);
    }
    .track-fill {
      height: 100%;
      width: 0%;
      border-radius: 0;
      background: linear-gradient(90deg, var(--cp-cyan), var(--cp-magenta));
      box-shadow: 0 0 12px rgba(92, 225, 255, 0.55);
      transition: width 0.12s linear;
    }
    .times {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 6px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums slashed-zero;
      /* JetBrains Mono: slashed 0 via OpenType where supported */
      font-feature-settings: "zero" 1;
      letter-spacing: 0.04em;
    }
    #elapsed {
      color: var(--cp-cyan-hot);
      text-shadow: 0 0 12px rgba(92, 225, 255, 0.55), 0 0 24px rgba(92, 225, 255, 0.2);
    }
    #total {
      color: rgba(230, 252, 255, 0.92);
      font-weight: 600;
      text-shadow: 0 0 8px rgba(255, 42, 163, 0.35);
    }
    .transport {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      margin-top: 12px;
      padding-top: 2px;
    }
    .transport button {
      appearance: none;
      border: 1px solid rgba(92, 225, 255, 0.22);
      background: rgba(0, 0, 0, 0.35);
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 4px;
      color: var(--cp-cyan-hot);
      line-height: 1;
      font-size: 15px;
      font-family: "JetBrains Mono", monospace;
      text-shadow: 0 0 10px rgba(92, 225, 255, 0.5);
      box-shadow:
        inset 0 0 0 1px rgba(92, 225, 255, 0.08),
        0 0 14px rgba(92, 225, 255, 0.12);
      transition: border-color 0.15s, box-shadow 0.15s, color 0.15s;
    }
    .transport button:hover {
      border-color: var(--cp-cyan-hot);
      box-shadow: 0 0 18px rgba(92, 225, 255, 0.35);
      color: #fff;
    }
    .transport button:active { transform: scale(0.96); }
    .transport .play-btn { font-size: 18px; padding: 5px 10px; }
    .idle .progress-wrap,
    .idle .transport { opacity: 0.35; pointer-events: none; }
    .idle .divider { opacity: 0.4; }
  </style>
</head>
<body>
  <div class="shell" id="shell">
    <div class="crt-wash" aria-hidden="true"></div>
    <div class="title" id="title"></div>
    <div class="subtitle" id="subtitle"></div>
    <div class="idle-hint" id="idleHint" hidden></div>
    <div class="divider" aria-hidden="true"></div>
    <div class="progress-wrap">
      <div class="track-bg"><div class="track-fill" id="fill"></div></div>
      <div class="times">
        <span id="elapsed">0:00</span>
        <span id="total">—</span>
      </div>
    </div>
    <div class="transport">
      <button type="button" id="btnPrev" title="Previous">⏮</button>
      <button type="button" class="play-btn" id="btnPlay" title="Play/Pause">⏸</button>
      <button type="button" id="btnNext" title="Next">⏭</button>
    </div>
  </div>
  <script src="js/tray-popover.js"></script>
</body>
</html>
