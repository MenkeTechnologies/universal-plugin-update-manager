<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Desaturated navy HUD (CRT reference) */
      --cp-bg0: #0a0e14;
      --cp-bg1: #121820;
      --cp-cyan: #5ce1ff;
      --cp-cyan-hot: #88eeff;
      --cp-cyan-dim: rgba(92, 225, 255, 0.5);
      --cp-magenta: #ff2aa3;
      --cp-magenta-dim: rgba(255, 42, 163, 0.45);
      --cp-text: #d8f8ff;
      --cp-muted: rgba(200, 235, 255, 0.42);
      --cp-scan: rgba(0, 0, 0, 0.22);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      min-height: 100%;
      height: auto;
      overflow: visible;
      margin: 0;
      outline: none;
      font-family: "JetBrains Mono", ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
      -webkit-font-smoothing: antialiased;
      background: transparent;
    }
    /* `overflow: hidden` clips `.crt-wash` cleanly to the `border-radius`. The window is truly
     * transparent (requires `macos-private-api` feature + `app.macOSPrivateApi: true`), so nothing
     * shows behind the rounded corners. */
    .shell {
      position: relative;
      width: 280px;
      min-height: 0;
      margin: 0;
      padding: 10px 12px 8px;
      border-radius: 16px;
      background: linear-gradient(168deg, #161c26 0%, var(--cp-bg1) 42%, var(--cp-bg0) 100%);
      border: 1px solid rgba(92, 225, 255, 0.22);
      overflow: hidden;
    }
    .shell .crt-wash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(180deg, transparent, transparent 1px, rgba(0, 0, 0, 0.15) 1px, rgba(0, 0, 0, 0.15) 2px),
        radial-gradient(ellipse 120% 80% at 50% 0%, rgba(92, 225, 255, 0.05) 0%, transparent 55%);
    }
    .title:empty { display: none; }
    .title {
      position: relative;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cp-text);
      text-shadow: 0 0 14px rgba(92, 225, 255, 0.35);
      max-height: 2.6em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .subtitle {
      position: relative;
      margin-top: 5px;
      font-size: 10px;
      line-height: 1.4;
      letter-spacing: 0.08em;
      color: var(--cp-cyan-dim);
      max-height: 2.8em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .subtitle:empty { display: none; }
    .divider {
      position: relative;
      height: 1px;
      margin: 8px 0 6px;
      background: linear-gradient(90deg, transparent, rgba(92, 225, 255, 0.35) 35%, rgba(255, 42, 163, 0.22) 65%, transparent);
    }
    .idle-hint {
      position: relative;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cp-muted);
      margin: 2px 0 0;
    }
    .progress-wrap { position: relative; margin-top: 2px; }
    /* Clickable scrubber: 14px hit area, 2px visible bar centered. `touch-action: none`
     * prevents the WebView from capturing drags as scroll/pan gestures. */
    .track-bar {
      position: relative;
      padding: 6px 0;
      cursor: pointer;
      touch-action: none;
    }
    .track-bg {
      position: relative;
      height: 2px;
      border-radius: 1px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(92, 225, 255, 0.18);
    }
    .track-fill {
      height: 100%;
      width: 0%;
      border-radius: 0;
      background: linear-gradient(90deg, var(--cp-cyan), var(--cp-magenta));
    }
    /* Small cyan thumb — no transition; position is driven by rAF in tray-popover.js. */
    .track-thumb {
      position: absolute;
      top: 50%;
      left: 0;
      width: 10px;
      height: 10px;
      margin-left: -5px;
      border-radius: 50%;
      background: var(--cp-cyan-hot);
      box-shadow: 0 0 6px rgba(92, 225, 255, 0.75), 0 0 1px rgba(255, 255, 255, 0.8) inset;
      pointer-events: none;
      transform: translateY(-50%);
    }
    .idle .track-thumb { opacity: 0; }
    .times {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 4px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums slashed-zero;
      /* JetBrains Mono: slashed 0 via OpenType where supported */
      font-feature-settings: "zero" 1;
      letter-spacing: 0.04em;
    }
    #elapsed {
      color: var(--cp-cyan-hot);
      text-shadow: 0 0 12px rgba(92, 225, 255, 0.55), 0 0 24px rgba(92, 225, 255, 0.2);
    }
    #total {
      color: rgba(230, 252, 255, 0.92);
      font-weight: 600;
      text-shadow: 0 0 8px rgba(255, 42, 163, 0.35);
    }
    .transport {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 8px;
      padding-top: 0;
    }
    .transport button {
      appearance: none;
      border: 1px solid rgba(92, 225, 255, 0.28);
      background: rgba(0, 0, 0, 0.42);
      cursor: pointer;
      padding: 4px 7px;
      border-radius: 3px;
      color: var(--cp-cyan-hot);
      line-height: 1;
      font-size: 14px;
      font-family: "JetBrains Mono", monospace;
      text-shadow: 0 0 8px rgba(92, 225, 255, 0.45);
      box-shadow: none;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .transport button:hover {
      border-color: var(--cp-cyan-hot);
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
    }
    .transport button:active { transform: scale(0.96); }
    .transport .play-btn { font-size: 16px; padding: 4px 8px; }
    .idle .progress-wrap { opacity: 0.35; pointer-events: none; }
    /* Transport must stay clickable when idle (prev/play/next still reach main via IPC). */
    .idle .transport { opacity: 0.45; }
    .idle .divider { opacity: 0.35; margin: 6px 0 4px; }
  </style>
</head>
<body>
  <div class="shell" id="shell">
    <div class="crt-wash" aria-hidden="true"></div>
    <div class="title" id="trayPopoverTitle"></div>
    <div class="subtitle" id="subtitle"></div>
    <div class="idle-hint" id="idleHint" hidden></div>
    <div class="divider" aria-hidden="true"></div>
    <div class="progress-wrap">
      <div class="track-bar" id="trackBar">
        <div class="track-bg">
          <div class="track-fill" id="fill"></div>
          <div class="track-thumb" id="trackThumb"></div>
        </div>
      </div>
      <div class="times">
        <span id="elapsed">0:00</span>
        <span id="total">—</span>
      </div>
    </div>
    <div class="transport">
      <button type="button" id="btnPrev" title="Previous">⏮</button>
      <button type="button" class="play-btn" id="btnPlay" title="Play/Pause">⏸</button>
      <button type="button" id="btnNext" title="Next">⏭</button>
    </div>
  </div>
  <script src="js/tray-popover.js"></script>
</body>
</html>
