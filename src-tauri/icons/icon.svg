<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Neon glow filters -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#ff00ff" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#39ff14" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outer-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Background gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#0d0221"/>
      <stop offset="100%" stop-color="#050010"/>
    </radialGradient>
    <!-- Equalizer bar gradient -->
    <linearGradient id="bar-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="60%" stop-color="#bf00ff"/>
      <stop offset="100%" stop-color="#ff0055"/>
    </linearGradient>
    <linearGradient id="bar-grad2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#39ff14"/>
      <stop offset="50%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <!-- Arrow gradient -->
    <linearGradient id="arrow-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39ff14"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </linearGradient>
  </defs>

  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg-grad)"/>

  <!-- Subtle grid lines for cyberpunk feel -->
  <g opacity="0.08" stroke="#00f0ff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Horizontal scan lines -->
  <g opacity="0.04" stroke="#00f0ff" stroke-width="1">
    <line x1="0" y1="64" x2="512" y2="64"/>
    <line x1="0" y1="96" x2="512" y2="96"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="224" x2="512" y2="224"/>
    <line x1="0" y1="288" x2="512" y2="288"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="352" x2="512" y2="352"/>
    <line x1="0" y1="416" x2="512" y2="416"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
  </g>

  <!-- Equalizer bars - audio visualizer style -->
  <g filter="url(#glow-cyan)">
    <!-- Bar 1 -->
    <rect x="68" y="280" width="24" height="120" rx="4" fill="url(#bar-grad)" opacity="0.9"/>
    <!-- Bar 2 -->
    <rect x="104" y="200" width="24" height="200" rx="4" fill="url(#bar-grad)" opacity="0.9"/>
    <!-- Bar 3 -->
    <rect x="140" y="150" width="24" height="250" rx="4" fill="url(#bar-grad)" opacity="0.9"/>
    <!-- Bar 4 -->
    <rect x="176" y="120" width="24" height="280" rx="4" fill="url(#bar-grad)" opacity="0.9"/>
    <!-- Bar 5 (tallest) -->
    <rect x="212" y="90" width="24" height="310" rx="4" fill="url(#bar-grad)" opacity="0.9"/>
    <!-- Bar 6 -->
    <rect x="248" y="110" width="24" height="290" rx="4" fill="url(#bar-grad)" opacity="0.9"/>
    <!-- Bar 7 -->
    <rect x="284" y="140" width="24" height="260" rx="4" fill="url(#bar-grad)" opacity="0.9"/>
    <!-- Bar 8 -->
    <rect x="320" y="170" width="24" height="230" rx="4" fill="url(#bar-grad)" opacity="0.9"/>
    <!-- Bar 9 -->
    <rect x="356" y="220" width="24" height="180" rx="4" fill="url(#bar-grad)" opacity="0.9"/>
    <!-- Bar 10 -->
    <rect x="392" y="260" width="24" height="140" rx="4" fill="url(#bar-grad)" opacity="0.9"/>
    <!-- Bar 11 -->
    <rect x="428" y="300" width="24" height="100" rx="4" fill="url(#bar-grad)" opacity="0.9"/>
  </g>

  <!-- Circular update arrow overlay -->
  <g transform="translate(256, 240)" filter="url(#glow-green)">
    <!-- Circular arrow path - update/refresh symbol -->
    <path d="M 0,-72 A 72,72 0 1,1 -62,-36" fill="none" stroke="url(#arrow-grad)" stroke-width="10" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="-72,-52 -52,-36 -72,-20" fill="#39ff14"/>

    <!-- Second arc -->
    <path d="M 0,72 A 72,72 0 1,1 62,36" fill="none" stroke="url(#arrow-grad)" stroke-width="10" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="72,52 52,36 72,20" fill="#39ff14"/>
  </g>

  <!-- "UP" text hint - small, subtle -->
  <g filter="url(#glow-magenta)" opacity="0.6">
    <text x="256" y="465" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="28" fill="#ff00ff" letter-spacing="8">UPDATE</text>
  </g>
</svg>
