[window]
width = 2200
height = 1400
x = 0
y = 0

[appearance]
theme = "dark"
colorScheme = "cyberpunk"
crtEffects = "on"
# Milliseconds to wait after pointer hover before showing title tooltips (0 = immediate). Implemented in the frontend; native WebKit title delay is not configurable.
tooltipHoverDelayMs = "600"

[scanning]
autoScan = "off"
# Background PDF page-count extraction when enabled (after library load; continues while window is backgrounded). "off" = idle-heavy gate + abort apply; use Command Palette / manual extract.
pdfMetadataAutoExtract = "on"
autoUpdate = "off"
singleClickPlay = "on"
autoPlaySampleOnSelect = "on"
defaultTypeFilter = "all"
customDirs = ""
audioScanDirs = ""
dawScanDirs = ""
presetScanDirs = ""
# When non-empty (one path per line), Folder Watch monitors only these directories. When empty, it uses plugin scan dirs plus all library scan dirs (Audio, DAW, Preset, MIDI, PDF) combined.
folderWatchDirs = ""
includeAbletonBackups = "off"
incrementalDirectoryScan = "on"

[sorting]
pluginSort = "name-asc"
audioSort = "name"
dawSort = "name"
presetSort = "name"
midiSort = "name"
pdfSort = "name"

[performance]
pageSize = "200"
flushInterval = "100"
threadMultiplier = "4"
# Rayon workers per BPM/Key/LUFS batch IPC (1–16). Lower leaves more CPU for playback/UI.
batchAnalysisThreads = "4"
# Rayon workers for byte-duplicate SHA-256 chunks (1–32). Does not change the global scan thread pool.
contentDupHashThreads = "8"
channelBuffer = "512"
batchSize = "100"
# Extra read-only SQLite file handles for parallel queries (WAL). "auto" = min(CPU cores, 16), min 2. Or 0–32 explicit. Restart to apply.
sqliteReadPoolExtra = "auto"
# Startup heavy housekeeping: delete older complete scans (per scanner type) beyond the last N. Default off — set "on" to cap history (larger DB if left off). "off" skips prune (VACUUM still runs). Next launch applies.
pruneOldScans = "off"
# How many most recent complete scans to retain per type when prune is on (1–100).
pruneOldScansKeep = "3"

[logging]
verbosity = "normal"

[player]
dock = "dock-br"
# Frontend prefs key `autoplayNextSource`: "samples" (visible table rows) or "player" (recently played list). EOF autoplay cycles that list only.
autoplayNextSource = "samples"

[audioEngine]
# Playback spectrum: JUCE FFT order 8–15 (256…32768 samples) or "off". Bands: 64…Nyquist or "max" — see Audio Engine tab selects (`#aePlaybackSpectrumFftOrder`, `#aePlaybackSpectrumBands`).
playbackSpectrumFftOrder = "11"
playbackSpectrumBands = "1024"

[tabs]
order = '["plugins","samples","daw","presets","favorites","history","settings"]'

[data]
widths = {}

[customScheme]
vars = {}
presets = []

[favorites]
items = []

[notes]
itemNotes = {}

[history]
recentlyPlayed = []
