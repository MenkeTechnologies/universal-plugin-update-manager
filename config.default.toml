[window]
width = 2200
height = 1400
x = 0
y = 0

[appearance]
theme = "dark"
colorScheme = "cyberpunk"
crtEffects = "on"

[scanning]
autoScan = "off"
autoUpdate = "off"
singleClickPlay = "off"
defaultTypeFilter = "all"
customDirs = ""
audioScanDirs = ""
dawScanDirs = ""
presetScanDirs = ""

[sorting]
pluginSort = "name-asc"
audioSort = "name"
dawSort = "name"

[performance]
pageSize = "500"
flushInterval = "100"

[player]
dock = "dock-br"

[tabs]
order = '["plugins","samples","daw","presets","favorites","history","settings"]'

[data]
widths = {}

[customScheme]
vars = {}
presets = []

[favorites]
items = []

[notes]
itemNotes = {}

[history]
recentlyPlayed = []
