name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PRs: one concurrency group per PR number — cancel superseded commits (saves matrix time).
# Pushes: group includes commit SHA so each push is its own group — rapid main commits no longer
# cancel or supersede each other’s in-flight or queued runs (they run in parallel).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Virtual workspace root: `Cargo.toml` at repo root; `cargo` writes `target/` here (not
      # `src-tauri/target`). `workspaces: src-tauri` made rust-cache treat `src-tauri/target` as
      # the cache dir, misaligning the real build output and breaking Windows test binaries (e.g.
      # STATUS_ENTRYPOINT_NOT_FOUND). Default is `. -> target` (see Swatinem/rust-cache README).
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev cmake ninja-build libasound2-dev libfreetype6-dev libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev libgl1-mesa-dev xvfb

      - name: Install Ninja (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ninja --yes

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check i18n JSON key order
        run: pnpm run i18n:sort:check

      - name: Run JS tests
        run: node scripts/run-js-tests.mjs

      # `cargo test` runs tauri-build, which validates `bundle.externalBin` paths (see `tauri.conf.json`).
      # The JUCE binary is not committed; dev uses `beforeDevCommand`, release uses `beforeBuildCommand`.
      - name: Prepare audio-engine for Tauri externalBin
        env:
          AUDIO_ENGINE_TAURI_BIN_PROFILE: debug
        run: node scripts/prepare-audio-engine-audioengine.mjs

      # Windows default shell is PowerShell — bash `if [ … ]` breaks with ParserError. Use matrix `if:` instead.
      - name: Run AudioEngine IPC tests (Linux + xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a node scripts/run-audio-engine-tests.mjs

      - name: Run AudioEngine IPC tests
        if: matrix.os != 'ubuntu-latest'
        run: node scripts/run-audio-engine-tests.mjs

      # Windows: plain `cargo test` hits STATUS_ENTRYPOINT_NOT_FOUND — MSVC/JUCE copies beside test
      # exes shadow the correct CRT. Pattern-matching CRT names still misses arbitrary JUCE DLLs.
      # Build once (`--no-run`), delete every `*.dll` under `target/debug` except a small allowlist
      # (WebView2Loader — required beside the harness), remove stray audio-engine copies, then run
      # each harness (no second Cargo invoke — avoids tauri-build recopying sidecars).
      - name: Run Rust tests (library + integration)
        if: matrix.os != 'windows-latest'
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run Rust tests (library + integration, Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          RUST_BACKTRACE: 1
        run: |
          $logFile = Join-Path $env:RUNNER_TEMP 'cargo-test-no-run.txt'
          & cargo test --manifest-path src-tauri/Cargo.toml --no-run --color never *> $logFile
          $cargoExit = $LASTEXITCODE
          Get-Content -LiteralPath $logFile | ForEach-Object { $_ }
          if ($cargoExit -ne 0) { exit $cargoExit }

          $exeRelPaths = [System.Collections.Generic.List[string]]::new()
          foreach ($line in (Get-Content -LiteralPath $logFile)) {
            if ($line -match 'Executable\s+(.+)\s+\((target[\\/]debug[\\/]deps[\\/][^\)]+\.exe)\)') {
              $exeRelPaths.Add($matches[2])
            }
          }
          if ($exeRelPaths.Count -lt 1) {
            throw "no test exe paths parsed from cargo test --no-run (expected target\debug\deps\*.exe on Windows)"
          }

          function Remove-WindowsTestSidecars([string]$rootDir) {
            $keepDlls = [System.Collections.Generic.HashSet[string]]::new([StringComparer]::OrdinalIgnoreCase)
            @('WebView2Loader.dll') | ForEach-Object { [void]$keepDlls.Add($_) }

            if (-not (Test-Path -LiteralPath $rootDir)) { return }
            foreach ($f in (Get-ChildItem -Path $rootDir -Recurse -File -ErrorAction SilentlyContinue)) {
              $name = $f.Name
              if ($name -ieq 'audio-engine.exe' -or $name -ieq 'audio-engine.pdb') {
                Remove-Item -Force -LiteralPath $f.FullName -ErrorAction SilentlyContinue
                continue
              }
              if ($f.Extension -ieq '.dll' -and -not $keepDlls.Contains($name)) {
                Remove-Item -Force -LiteralPath $f.FullName -ErrorAction SilentlyContinue
              }
            }
          }

          $td = Join-Path $env:GITHUB_WORKSPACE 'target/debug'
          Remove-WindowsTestSidecars $td

          $depsDll = Join-Path $td 'deps'
          if (Test-Path -LiteralPath $depsDll) {
            $names = @(Get-ChildItem -LiteralPath $depsDll -Filter *.dll -File -ErrorAction SilentlyContinue | ForEach-Object { $_.Name } | Sort-Object -Unique)
            Write-Host "target/debug/deps *.dll after sidecar strip ($($names.Count)):" ($names -join ', ')
          }

          Push-Location $env:GITHUB_WORKSPACE
          try {
            $i = 0
            foreach ($rel in $exeRelPaths) {
              $full = Join-Path $env:GITHUB_WORKSPACE ($rel -replace '/', [IO.Path]::DirectorySeparatorChar)
              if (-not (Test-Path -LiteralPath $full)) { throw "missing test exe: $full" }
              # First harness only: no --quiet so failures show STATUS_ENTRYPOINT_NOT_FOUND vs panics (--quiet hid all stderr on failure).
              if ($i -eq 0) { & $full } else { & $full --quiet }
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              $i++
            }
          } finally {
            Pop-Location
          }
          exit 0

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev cmake ninja-build libasound2-dev libfreetype6-dev libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev libgl1-mesa-dev xvfb

      - name: Install Ninja (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ninja --yes

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check i18n JSON key order
        run: pnpm run i18n:sort:check

      - name: Build Tauri (CI, unsigned bundles)
        run: pnpm run tauri:build:ci

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore
