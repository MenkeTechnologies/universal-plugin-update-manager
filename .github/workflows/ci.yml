name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev cmake ninja-build libasound2-dev libfreetype6-dev libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev libgl1-mesa-dev xvfb

      - name: Install Ninja (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ninja --yes

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run JS tests
        run: node scripts/run-js-tests.mjs

      # `cargo test` runs tauri-build, which validates `bundle.externalBin` paths (see `tauri.conf.json`).
      # The JUCE binary is not committed; dev uses `beforeDevCommand`, release uses `beforeBuildCommand`.
      - name: Prepare audio-engine for Tauri externalBin
        env:
          AUDIO_ENGINE_TAURI_BIN_PROFILE: debug
        run: node scripts/prepare-audio-engine-audioengine.mjs

      # Windows default shell is PowerShell — bash `if [ … ]` breaks with ParserError. Use matrix `if:` instead.
      - name: Run AudioEngine IPC tests (Linux + xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a node scripts/run-audio-engine-tests.mjs

      - name: Run AudioEngine IPC tests
        if: matrix.os != 'ubuntu-latest'
        run: node scripts/run-audio-engine-tests.mjs

      # Swatinem/rust-cache can restore an old `target/debug` that still had JUCE/MSVC outputs
      # from before audio-engine moved to `audio-engine-artifacts/` — stray DLLs next to Cargo's
      # outputs break `cargo test --lib` with STATUS_ENTRYPOINT_NOT_FOUND on Windows.
      - name: Clean legacy JUCE/MSVC junk from target/debug (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $td = Join-Path $env:GITHUB_WORKSPACE 'target/debug'
          if (-not (Test-Path $td)) { exit 0 }
          Remove-Item -Force -ErrorAction SilentlyContinue (Join-Path $td 'audio-engine.exe')
          Remove-Item -Force -ErrorAction SilentlyContinue (Join-Path $td 'audio-engine.pdb')
          Get-ChildItem -Path $td -File -Filter *.dll | Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Run Rust tests (library)
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Run Rust tests (behavioral_ultra + app_i18n + i18n catalog seed guards)
        run: cargo test --manifest-path src-tauri/Cargo.toml --test behavioral_ultra --test app_i18n_test --test i18n_catalog_html_guard_buckets --test i18n_catalog_no_nul_guard_buckets --test i18n_catalog_no_unsafe_char_guard_buckets

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev cmake ninja-build libasound2-dev libfreetype6-dev libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev libgl1-mesa-dev xvfb

      - name: Install Ninja (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ninja --yes

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (CI, unsigned bundles)
        run: pnpm run tauri:build:ci

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore
