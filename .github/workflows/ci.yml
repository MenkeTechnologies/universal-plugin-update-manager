name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Rapid pushes otherwise queue many full matrix runs; cancel older work on the same ref so the
# latest commit is what finishes (saves queue time and avoids stale red X from superseded SHAs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Virtual workspace root: `Cargo.toml` at repo root; `cargo` writes `target/` here (not
      # `src-tauri/target`). `workspaces: src-tauri` made rust-cache treat `src-tauri/target` as
      # the cache dir, misaligning the real build output and breaking Windows test binaries (e.g.
      # STATUS_ENTRYPOINT_NOT_FOUND). Default is `. -> target` (see Swatinem/rust-cache README).
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev cmake ninja-build libasound2-dev libfreetype6-dev libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev libgl1-mesa-dev xvfb

      - name: Install Ninja (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ninja --yes

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run JS tests
        run: node scripts/run-js-tests.mjs

      # `cargo test` runs tauri-build, which validates `bundle.externalBin` paths (see `tauri.conf.json`).
      # The JUCE binary is not committed; dev uses `beforeDevCommand`, release uses `beforeBuildCommand`.
      - name: Prepare audio-engine for Tauri externalBin
        env:
          AUDIO_ENGINE_TAURI_BIN_PROFILE: debug
        run: node scripts/prepare-audio-engine-audioengine.mjs

      # Windows default shell is PowerShell — bash `if [ … ]` breaks with ParserError. Use matrix `if:` instead.
      - name: Run AudioEngine IPC tests (Linux + xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a node scripts/run-audio-engine-tests.mjs

      - name: Run AudioEngine IPC tests
        if: matrix.os != 'ubuntu-latest'
        run: node scripts/run-audio-engine-tests.mjs

      # Windows: Tauri/externalBin + MSVC can leave JUCE/vcrt DLLs beside `target/debug/deps/*.exe`.
      # The loader resolves those first → STATUS_ENTRYPOINT_NOT_FOUND. Must compile the *same*
      # cargo invocation as the run (`--no-run` then execute), strip sidecars, then run
      # with zero compile work so build.rs does not re-copy DLLs before execute.
      - name: Run Rust tests (library + integration)
        if: matrix.os != 'windows-latest'
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run Rust tests (library + integration, Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --no-run
          function Remove-JuceSidecars([string]$dir) {
            if (-not (Test-Path $dir)) { return }
            Remove-Item -Force -ErrorAction SilentlyContinue (Join-Path $dir 'audio-engine.exe')
            Remove-Item -Force -ErrorAction SilentlyContinue (Join-Path $dir 'audio-engine.pdb')
            Get-ChildItem -Path $dir -File -Filter *.dll | Remove-Item -Force -ErrorAction SilentlyContinue
          }
          $td = Join-Path $env:GITHUB_WORKSPACE 'target/debug'
          Remove-JuceSidecars $td
          Remove-JuceSidecars (Join-Path $td 'deps')
          cargo test --manifest-path src-tauri/Cargo.toml -- --quiet

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev cmake ninja-build libasound2-dev libfreetype6-dev libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev libgl1-mesa-dev xvfb

      - name: Install Ninja (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ninja --yes

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (CI, unsigned bundles)
        run: pnpm run tauri:build:ci

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore
